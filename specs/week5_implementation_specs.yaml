# Week 5 - Implementation Specs (REVISED: precision, not recall)

# CONTEXT — why this spec was repointed:
# The original Week 5 plan was "LoRA to fix false_but_checkable/denial_with_stat
# false negatives." That premise was overturned by two findings:
#   1. Eval-set leakage inflated all earlier numbers (few-shot examples were eval posts).
#   2. After de-leaking, the recall shortfall turned out to be a BATCH-MODE artifact:
#      same leak-free prompt, batch-of-16 = recall 0.750, single-post = recall 0.938 (PASS).
# Recall is therefore solved by a config change (llm_batch_size 16 -> 1), not a fine-tune.
# The remaining problem is PRECISION (~0.70): in single-post mode the model over-calls
# vague_conspiracy posts as claims. This spec targets precision.

approach:
  summary: >
    Lock in single-post inference (recall 0.938), then raise precision-on-CLAIM from
    ~0.70 by tightening the OPINION boundary for vague conspiracy posts — trying
    prompt-level fixes and an optional confidence gate first, and escalating to a
    precision-targeted LoRA adapter only if the cheap fixes plateau.

  decisions:
    recall_is_solved_by_config:
      choice: Set llm_batch_size = 1 (single-post). No fine-tuning needed for recall.
      reasoning: >
        Holding the leak-free prompt constant, batch-16 scored recall 0.750 and
        single-post 0.938 on the same 100-row eval. The 3B model drifts when classifying
        16 posts per call. Single-post meets the 0.90 recall target; the cost is ~16x more
        calls, absorbed by GPU/Colab for the backlog.

    target_metric_is_precision:
      choice: Headline to improve = precision-on-CLAIM (~0.70 now), holding recall >= 0.90.
      reasoning: >
        With recall met, the bottleneck is false positives — vague_conspiracy and
        conspiracy-flavoured real_data posts ("Weather manipulation is real", "They are
        hiding the truth about Antarctica") read by the model as checkable claims. These
        add downstream noise. Recall stays a guardrail, not the optimization target.

    escalation_order:
      choice: Prompt fix -> confidence gate -> LoRA, in that order, gated by the eval.
      reasoning: >
        The session's repeated lesson: try the cheap, reversible intervention at the
        specific failure first and measure before escalating. We have NOT yet tried a
        prompt fix aimed at vague conspiracy precision, so LoRA is not yet justified for
        precision either.

    leak_free_invariant:
      choice: Few-shot examples and any LoRA training data must stay disjoint from the 100-row eval.
      reasoning: >
        The earlier inflated numbers came from eval posts used as few-shot examples.
        Verify disjointness before trusting any number (a one-line check against claim_eval.csv).

tasks:
  task_1_lock_single_post:
    name: Lock single-post inference and re-confirm the recall baseline
    details: |
      - config.yaml model.llm_batch_size is now 1 (done).
      - Re-run: uv run python -m climate_verifier.pipeline.evaluate
      - Confirm recall ~0.938 (PASS) and record the precision baseline (~0.70) and the
        by_post_type FP breakdown (vague_conspiracy, conspiracy real_data are the hot spots).

  task_2_prompt_precision_fix:
    name: Tighten the OPINION boundary for vague conspiracy (cheap fix first)
    details: |
      In claim_classifier.py, sharpen the system prompt's OPINION definition so a vague
      accusation with conspiratorial nouns but NO specific named event/mechanism/measurement
      is OPINION. Add 1-2 leak-free few-shot examples of "vague conspiracy -> opinion"
      (verify NOT in claim_eval.csv). Re-run eval. Success = precision up, recall still >= 0.90.
      This mirrors the false-but-checkable contrast: specific+checkable = CLAIM, vague
      accusation = OPINION — the model currently conflates "conspiratorial-sounding" with
      "checkable".

  task_3_optional_confidence_gate:
    name: (Optional) Confidence / second-pass gate for borderline claims
    details: |
      If the prompt fix under-delivers, add a lightweight second check: re-classify only
      the posts labeled CLAIM with a stricter "is there a SPECIFIC named, checkable
      assertion?" prompt, demoting the vague ones. Cheaper than fine-tuning; preserves recall.

  task_4_conditional_lora_for_precision:
    name: (Conditional) Precision-targeted LoRA — only if tasks 2-3 plateau
    details: |
      ONLY if prompt + gate cannot lift precision without dropping recall below 0.90:
      train a LoRA adapter (qwen2.5:3b base, PEFT, Colab T4) on teacher-labeled posts that
      OVERSAMPLE the precision boundary — vague_conspiracy opinions vs specific checkable
      claims. Hard constraint: training set excludes in_eval_set=1 posts and the 56 synthetic
      eval rows. Merge -> GGUF -> Ollama Modelfile; only config.yaml model.name changes.
      Evaluate on the same 100-row eval: precision up, recall >= 0.90, easy categories not regressed.

integration_steps:
  - config.yaml model.llm_batch_size = 1 is the single change that fixes recall; classify_batch,
    classify_pending and evaluate.py all honor it with no code change.
  - Prompt edits stay in claim_classifier.py; keep all few-shot examples disjoint from claim_eval.csv.
  - Backlog classification at batch=1 is ~16x more calls — run it on GPU/Colab via the existing
    tmp/colab export-import workflow.
  - Any LoRA model swaps in via config.yaml model.name only (GGUF + Ollama Modelfile).

evaluation_plan:
  metrics: [precision_on_claim, recall_on_claim, false_positives_by_post_type, error_rate_by_keyword_category]
  dataset_size: 100
  baseline: qwen2.5:3b single-post leak-free — recall 0.938, precision ~0.70 (same eval set, unchanged)

reference_materials:
  notebook: notebooks/week5_fine_tuning_with_adapters.ipynb

success_criteria:
  minimum: >
    Single-post locked in (recall >= 0.90 confirmed) and a precision baseline recorded,
    with the vague_conspiracy false-positive hot spot identified in the by_post_type breakdown.
  good: >
    precision-on-CLAIM rises meaningfully above ~0.70 (fewer vague_conspiracy / real_data
    false positives) while recall stays >= 0.90 — achieved by the cheapest intervention that
    works (prompt fix preferred; LoRA only if prompt + gate plateau).

verification:
  cli:
    - "Confirm config: llm_batch_size is 1 in src/climate_verifier/config.yaml."
    - "Run: uv run python -m climate_verifier.pipeline.evaluate — confirm recall ~0.938 (PASS) and note precision (~0.70 baseline)."
    - "After task_2, re-run and confirm precision rose and recall is still >= 0.90; check vague_conspiracy FP dropped in the by_post_type table."
    - "Leak check: confirm no few-shot example (or LoRA training row) appears in data/claim_eval.csv."
  streamlit:
    - "Start the app: uv run streamlit run app.py and open http://localhost:8501"
    - "Paste a vague conspiracy opinion (e.g. 'They are hiding the truth about the weather') and confirm it is now labeled OPINION — the precision boundary this spec targets."
    - "Paste a specific checkable post (e.g. 'Cloud seeding planes triggered the flash floods in Dubai last week') and confirm it is still labeled CLAIM (recall not sacrificed)."

known_pitfalls:
  - "Raw model.generate() does not enforce JSON format unlike Ollama. If you test a LoRA adapter via transformers/PEFT instead of through Ollama, extract the JSON object with re.search(r'\\{.*\\}', output, re.DOTALL) before json.loads(), or use constrained decoding. The production path (GGUF + Ollama) enforces JSON automatically."
  - "Precision/recall tradeoff: tightening the OPINION boundary can re-introduce false negatives. After every change, check recall stayed >= 0.90 in the by_post_type table, not just that precision rose."
  - "Leakage is the silent failure: any few-shot example or LoRA training row that is also an eval post invalidates the number. Verify disjointness against claim_eval.csv before trusting results."
