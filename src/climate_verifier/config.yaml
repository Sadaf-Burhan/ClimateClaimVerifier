model:
  name: "qwen2.5:3b"   # leak-free eval: recall 0.938 single-post / 0.750 batch-16; precision ~0.70
  temperature: 0.0     # deterministic output for consistent classification
  llm_batch_size: 1    # single-post: batching 16/call cost ~0.19 recall (3B model drifts).
                       # 1/call hits the 0.90 recall target but is ~16x more calls — run the
                       # backlog on GPU/Colab. Raise (e.g. 4) only to trade recall for speed.
  adapter_name: "qwen2.5-3b-claim-lora"  # Week-5 LoRA, registered in Ollama as a GGUF.
                       # Demo-only (the Base vs Adapter tab); NOT the production model.

embedding:
  model_name: "all-MiniLM-L6-v2"   # sentence-transformers; higher MTEB STS scores than nomic-embed-text

evidence:                          # Week 6 — evidence matching (GDELT news corroboration via ChromaDB)
  chroma_path: data/chroma_evidence   # persistent vector store (gitignored)
  top_k: 5                            # nearest GDELT articles retrieved per claim
  high_proximity: 0.60                # >= : published news covers a similar event  (HIGH)
  low_proximity: 0.40                 # <  : no corroboration                       (NONE)
  high_reach: 50                      # engagement >= this counts as "high reach" for the red flag

  # A post is NOT red-flagged if it comes from an official source (official warnings /
  # forecasts are legitimate and have no news corroboration yet). Conservative suffix
  # match on the account handle / news domain — an "altgov" lookalike must NOT match.
  official_sources:
    - noaa.gov
    - weather.gov
    - weather.gc.ca
    - canada.ca
    - ec.gc.ca
    - nasa.gov
    - ipcc.ch
    # NWS/weather relay bots — legitimate warning feeds (domain-controlled, so the suffix
    # match only catches the real owner's accounts, e.g. pit.nws-bot.us, ctp.weather.im).
    - nws-bot.us
    - weather.im

  # A post is NOT red-flagged if it self-cites a credible source (a study/journal/news
  # link in the post text) — it provides its own evidence for the reader to review.
  citation_domains:
    - gov
    - edu
    - sciencedaily.com
    - nature.com
    - science.org
    - pnas.org
    - agu.org
    - reuters.com
    - apnews.com
    - bbc.com
    - bbc.co.uk
    - cbc.ca
    - theguardian.com

vision:                            # Week 7 — GATED image modality (edge cases only, not per-post)
  model: "qwen2.5vl:7b"             # Ollama tag; natural-photo + OCR; real-photo vs cartoon/meme
  corrector_model: "qwen2.5:3b"     # reformats malformed vision JSON — never sees the image
  gate_categories: []               # empty = ALL categories. A misclassification can occur in any
                                    #   topic, so vision escalates any text-uncertain image-claim,
                                    #   not a category. (List categories here to re-narrow if needed.)
  max_images: 200                   # cap vision calls per run (cost guard; raised — more posts qualify)
  download_timeout: 20              # seconds to fetch an image before giving up

evaluation:
  claim_eval_csv: data/claim_eval.csv   # hand-labeled eval set (60 posts, stratified by category + post type)
  claim_recall_target: 0.90             # success criterion — a missed claim (FN) is the costly, unrecoverable error

ingestion:
  interval_hours: 24
  bluesky_limit: 100          # max posts per keyword per run
  gdelt_days_back: 1          # how many days back to query GDELT
  gdelt_delay_seconds: 10     # delay between GDELT requests (rate limit)
  gdelt_retries: 3

  keywords:

    # --- Scientific / Factual ---
    # Legitimate climate science terms — expected to return credible posts
    scientific:
      - "climate change"
      - "global warming"
      - "atmospheric river"
      - "polar vortex"
      - "arctic meltdown"
      - "sea level rise"
      - "permafrost thaw"
      - "ice sheet collapse"
      - "greenland melt"
      - "antarctica melting"
      - "carbon capture"
      - "geoengineering"
      - "solar radiation management"
      - "climate tipping point"

    # --- Extreme Weather Events ---
    # Real events that generate both accurate reporting and misinformation
    extreme_events:
      - "wildfire smoke"
      - "flood warning"
      - "tornado warning"
      - "hurricane warning"
      - "heat dome"
      - "record heatwave"
      - "mega drought"
      - "superstorm"
      - "methane bomb"
      - "climate refugees"

    # --- Sensationalist / Exaggerated ---
    # Emotionally charged language — may be real events grossly overstated
    sensationalist:
      - "climate emergency"
      - "climate catastrophe"
      - "climate collapse"
      - "runaway warming"
      - "point of no return"
      - "mass extinction climate"
      - "ocean boiling"
      - "blue ocean event"
      - "sea level surge"
      - "hyper hurricane"
      - "jet stream collapse"
      - "permafrost explosion"
      - "climate bomb"

    # --- Conspiracy / Misinformation Targets ---
    # Searches designed to pull in false or manipulative claims
    conspiracy:
      - "climate hoax"
      - "climate data cover-up"
      - "weather manipulation proof"
      - "cloud seeding"
      - "HAARP weather control"
      - "chemtrails climate"
      - "climate lockdowns"
      - "net zero agenda"
      - "carbon tax conspiracy"
      - "geoengineering secret program"
      - "climate scientists hiding"

    # --- Compound Searches ---
    # Multi-term queries targeting specific misinformation narratives
    combinations:
      - "methane bomb extinction"
      - "geoengineering secret program"
      - "climate lockdowns government control"
      - "antarctica melting scientists hiding"
      - "weather manipulation proof"
      - "climate hoax government agenda"
      - "chemtrails weather control"

storage:
  db_path: data/ingested.db   # SQLite database
  hot_window_days: 7
  cold_window_days: 30
