model:
  name: "qwen2.5:3b"   # leak-free eval: recall 0.938 single-post / 0.750 batch-16; precision ~0.70
  temperature: 0.0     # deterministic output for consistent classification
  llm_batch_size: 1    # single-post: batching 16/call cost ~0.19 recall (3B model drifts).
                       # 1/call hits the 0.90 recall target but is ~16x more calls — run the
                       # backlog on GPU/Colab. Raise (e.g. 4) only to trade recall for speed.
  adapter_name: "qwen2.5-3b-claim-lora"  # Week-5 LoRA, registered in Ollama as a GGUF.
                       # Demo-only (the Base vs Adapter tab); NOT the production model.

embedding:
  model_name: "all-MiniLM-L6-v2"   # sentence-transformers; higher MTEB STS scores than nomic-embed-text

evidence:                          # Week 6 — evidence matching (GDELT news corroboration via ChromaDB)
  chroma_path: data/chroma_evidence   # persistent vector store (gitignored)
  top_k: 5                            # nearest GDELT articles retrieved per claim
  high_proximity: 0.60                # >= : published news covers a similar event  (HIGH)
  topic_proximity: 0.50               # >= : counts as a TOPIC MATCH in the reader UI. Below this a
                                      #   retrieved article is a weak/noise neighbour (e.g. 0.42) and
                                      #   reads as NO MATCH with the nearest headline shown for transparency.
  low_proximity: 0.40                 # <  : display floor — articles below this aren't shown at all
  high_reach: 50                      # engagement >= this counts as "high reach" for the red flag

  index_credible_citations: true      # ALSO index a post's self-cited CREDIBLE article (its external
                                      #   link on a citation_domains / official_sources domain) as
                                      #   evidence, so the post's own source surfaces as REPORTED
                                      #   instead of a topical near-miss. Rebuild the index after
                                      #   toggling: uv run python -m climate_verifier.pipeline.evidence --build

  # --- Region- and time-aware retrieval (Week 6 improvement) ----------------------
  # Location is derived per GDELT article (headline place-name, else the domain — e.g.
  # weatherbc.com -> British Columbia) and embedded INTO the vector document; the claim's
  # location is embedded into the query the same way, so same-region news ranks higher.
  # Soft by design (no hard location filter — a US outlet covering a BC fire has no "bc"
  # in its domain and must still match). Rebuild the index after changing this:
  #   uv run python -m climate_verifier.pipeline.evidence --build
  use_llm_rerank: false               # region-aware retrieval carries the match, so the LLM
                                      #   corroboration re-rank is OPTIONAL. false = trust
                                      #   retrieval (verdict from proximity; a strong match is
                                      #   "partial", never "corroborated"). true = keep the
                                      #   'same specific event vs same region+time, different
                                      #   event' guard (one extra LLM call per claim).
  date_window_days: 0                 # HARD +/-N-day filter on article date vs the claim's
                                      #   date. 0 = OFF (default): a live pasted post is dated
                                      #   NOW while the corpus is from its ingestion window, so
                                      #   a filter would drop every article. Set e.g. 14 only
                                      #   when claim and corpus are temporally aligned.

  # A post is NOT red-flagged if it comes from an official source (official warnings /
  # forecasts are legitimate and have no news corroboration yet). Conservative suffix
  # match on the account handle / news domain — an "altgov" lookalike must NOT match.
  official_sources:
    - noaa.gov
    - weather.gov
    - weather.gc.ca
    - canada.ca
    - ec.gc.ca
    - nasa.gov
    - ipcc.ch
    # NWS/weather relay bots — legitimate warning feeds (domain-controlled, so the suffix
    # match only catches the real owner's accounts, e.g. pit.nws-bot.us, ctp.weather.im).
    - nws-bot.us
    - weather.im

  # A post is NOT red-flagged if it self-cites a credible source (a study/journal/news
  # link in the post text) — it provides its own evidence for the reader to review.
  citation_domains:
    - gov
    - edu
    - sciencedaily.com
    - nature.com
    - science.org
    - pnas.org
    - agu.org
    - reuters.com
    - apnews.com
    - bbc.com
    - bbc.co.uk
    - cbc.ca
    - theguardian.com
    - nytimes.com
    - washingtonpost.com
    # Nonprofit climate newsrooms with editorial standards — added 2026-07-15 after auditing what
    # the corpus actually cites: these were among the most-cited domains getting NO credit, which
    # means legitimately-sourced posts were being read as "no cited evidence".
    - insideclimatenews.org      # Pulitzer-winning climate newsroom (19 cites in corpus)
    - grist.org                  # established climate nonprofit newsroom (7 cites)
    # NB: UK outlets (theguardian/bbc) stay listed on purpose — credibility is NOT geography. The
    # NA scope filters the POSTS (topic_filter); a Guardian article about a US wildfire is still a
    # credible source for an in-scope post.
    # KNOWN GAP: URL shorteners (bit.ly, share.google, dlvr.it, ow.ly — ~67 posts) hide the real
    # domain, so a post citing the NYT via bit.ly gets no credit and can be red-flagged as
    # "uncited". Resolving them needs a redirect fetch at ingestion — see MONITORING.md future work.
    # climate.us — climate-information hub launched by former NOAA scientists. Treated as a
    # credible self-citation so a post that links it as its SUPPORTING article isn't red-flagged
    # and surfaces in the missed-claim queue (the DOGE image-carried-claim case). Newer/less
    # established than the wire services above — listed here as a DELIBERATE editorial choice,
    # documented so the inclusion isn't mistaken for an oversight.
    - climate.us

vision:                            # Week 7 — GATED image modality (edge cases only, not per-post)
  model: "qwen2.5vl:7b"             # Ollama tag; natural-photo + OCR; real-photo vs cartoon/meme
  corrector_model: "qwen2.5:3b"     # reformats malformed vision JSON — never sees the image
  gate_categories: []               # empty = ALL categories. A misclassification can occur in any
                                    #   topic, so vision escalates any text-uncertain image-claim,
                                    #   not a category. (List categories here to re-narrow if needed.)
  max_images: 200                   # cap vision calls per run (cost guard; raised — more posts qualify)
  download_timeout: 20              # seconds to fetch an image before giving up

evaluation:
  # TWO eval sets, deliberately SEPARATE — they answer different questions, and merging them (as we
  # did until 2026-07-15) makes both unreadable: you can never tell whether a recall move came from
  # the model changing or the test set getting harder. Each maintenance pass evaluates BOTH and logs
  # one drift line each, tagged `eval_set`.
  #
  # GOLD = the frozen control. 100 posts (48 claim / 52 opinion), NEVER appended to. The data is
  #   constant, so ANY movement here is the MODEL or the ENVIRONMENT — this is what gives you the
  #   +/- jitter band and catches regressions. Never let the relabel loop touch this file.
  gold_eval_csv: data/claim_eval_gold.csv
  # DYNAMIC = grows via the admin relabel loop. Movement here mixes model change WITH distribution
  #   change, which is the point: it measures CONCEPT drift — does the model generalize to the new
  #   hard cases the relabel queue keeps surfacing? Read it against gold, never alone.
  #   NB: Colab evaluates the COMMITTED csv — commit relabels or they never reach the benchmark.
  claim_eval_csv: data/claim_eval.csv
  claim_recall_target: 0.90             # success criterion — a missed claim (FN) is the costly, unrecoverable error

ingestion:
  interval_hours: 24
  bluesky_limit: 100          # max posts per keyword per run
  gdelt_days_back: 1          # how many days back to query GDELT
  gdelt_delay_seconds: 10     # delay between GDELT requests (rate limit)
  gdelt_retries: 3

  # --- Demand-driven evidence top-up (claims' topic+region drive GDELT) ----------
  # No cap on articles-per-topic: recency + URL-dedup are the bounds, not a fixed number.
  topup_enabled: true         # run the top-up at the end of each autonomous ingestion cycle
                              #   (rebuilds the evidence index when new articles are added)
  topup_days_back: 7          # GDELT window for the demand-driven top-up queries
  topup_min_recent: 2         # floor: top a topic up until it has >= this many RECENT
                              #   articles (recency-based, so coverage self-refreshes as it ages)
  max_article_age_days: 45    # DATE RELEVANCY: never ingest an article older than this. GDELT
                              #   already returns recent news; this is a hard guard so a stale
                              #   (e.g. years-old) article can never enter the corpus.
  topup_max_topics: 60        # per-run safety cap on distinct topics queried (logged, not silent)

  evidence_cap_enabled: false # after the top-up, garbage-collect the evidence corpus and rebuild
                              #   the index — keeps GDELT from growing without bound (scalability).
                              #   OFF until the prune is validated: run `--prune-evidence` manually to
                              #   test, then flip to true to adopt the rule into autonomous cycles.
  evidence_max_per_topic: 2   # hard cap: keep at most this many GDELT articles per topic, chosen
                              #   by embedding relevance to the topic query; the rest are deleted

  keywords:

    # --- Scientific / Factual ---
    # Legitimate climate science terms — expected to return credible posts
    scientific:
      - "climate change"
      - "global warming"
      - "atmospheric river"
      - "polar vortex"
      - "arctic meltdown"
      - "sea level rise"
      - "permafrost thaw"
      - "ice sheet collapse"
      - "greenland melt"
      - "antarctica melting"
      - "carbon capture"
      - "geoengineering"
      - "solar radiation management"
      - "climate tipping point"

    # --- Extreme Weather Events ---
    # Real events that generate both accurate reporting and misinformation
    extreme_events:
      - "wildfire smoke"
      - "flood warning"
      - "tornado warning"
      - "hurricane warning"
      - "heat dome"
      - "record heatwave"
      - "mega drought"
      - "superstorm"
      - "methane bomb"
      - "climate refugees"

    # --- Sensationalist / Exaggerated ---
    # Emotionally charged language — may be real events grossly overstated
    sensationalist:
      - "climate emergency"
      - "climate catastrophe"
      - "climate collapse"
      - "runaway warming"
      - "point of no return"
      - "mass extinction climate"
      - "ocean boiling"
      - "blue ocean event"
      - "sea level surge"
      - "hyper hurricane"
      - "jet stream collapse"
      - "permafrost explosion"
      - "climate bomb"

    # --- Conspiracy / Misinformation Targets ---
    # Searches designed to pull in false or manipulative claims
    conspiracy:
      - "climate hoax"
      - "climate data cover-up"
      - "weather manipulation proof"
      - "cloud seeding"
      - "HAARP weather control"
      - "chemtrails climate"
      - "climate lockdowns"
      - "net zero agenda"
      - "carbon tax conspiracy"
      - "geoengineering secret program"
      - "climate scientists hiding"

    # --- Compound Searches ---
    # Multi-term queries targeting specific misinformation narratives
    combinations:
      - "methane bomb extinction"
      - "geoengineering secret program"
      - "climate lockdowns government control"
      - "antarctica melting scientists hiding"
      - "weather manipulation proof"
      - "climate hoax government agenda"
      - "chemtrails weather control"

storage:
  db_path: data/ingested.db   # SQLite database
  hot_window_days: 7
  cold_window_days: 30

  # --- Corpus refresher (runs at the end of each ingestion cycle) -----------------
  # Keeps the Bluesky corpus fresh and free of dead links. Never touches GDELT (the
  # evidence corpus) or held-out eval/train posts. Preview first: run
  #   uv run python -m climate_verifier.ingestion.scheduler --refresh --dry-run
  refresh_enabled: true       # run the refresher at the end of each cycle
  retention_days: 14          # remove Bluesky posts older than 2 weeks (live OR deleted) — a
                              #   user can always paste an old post's link to assess it live
  verify_availability: true   # also remove Bluesky posts that no longer exist on Bluesky (deleted)
  verify_batch: 500           # max posts to availability-check per cycle (API-call bound)
